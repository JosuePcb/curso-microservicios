<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

  <main id="main">

      <!-- Título -->
      <div id="welcome-container">
        <p id="welcome">ChatBot</p>
      </div>

      <!-- Área de mensajes -->
      <div id="chat-container"></div>

      <!-- Input -->
      <div class="input-container">
        <div class="file-preview" id="filePreview" style="display: none">
          <div class="file-preview-item">
            <img id="fileThumb" src="" alt="" style="display:none" />
            <span id="fileName"></span>
            <button id="removeFile">✕</button>
          </div>
        </div>

        <textarea
          name="request"
          id="request"
          placeholder="Ask to chatbot"
          rows="1"
        ></textarea>

        <div class="input-actions">
          <input type="file" name="submitFile" id="submitFile" accept="image/*,.pdf,.txt" />
          <label for="submitFile" class="file-upload">
            <i data-lucide="file-text"></i>
          </label>

          <button id="sendBtn" class="send-btn">
            <i data-lucide="send-horizontal"></i>
          </button>
        </div>
      </div>

      <!-- Token counter -->
      <div id="token-bar" style="display:none">
        <span class="token-item">
          <i data-lucide="arrow-up-circle"></i>
          Input: <strong id="tok-input">0</strong>
        </span>
        <span class="token-divider">·</span>
        <span class="token-item">
          <i data-lucide="arrow-down-circle"></i>
          Output: <strong id="tok-output">0</strong>
        </span>
        <span class="token-divider">·</span>
        <span class="token-item total">
          Total sesión: <strong id="tok-total">0</strong>
        </span>
      </div>

    

    <button id="themeToggle" class="theme-toggle">
      <i data-lucide="sun"></i>
    </button>
  </main>
    <script>lucide.createIcons();</script>
    <script src="script.js"></script>
  </body>
</html>
